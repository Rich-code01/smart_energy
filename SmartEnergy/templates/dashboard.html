<!DOCTYPE html>
<html>

<head>
    <title>Smart Energy Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="/static/dashboard.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI;
            background: #0b0f14;
            color: #e6e6e6;
        }

        h1 {
            padding: 12px;
            font-size: 16px;
            background: #111826;
            margin: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 220px;
            gap: 10px;
            padding: 10px;
        }

        .card {
            background: #111826;
            border: 1px solid #1f2a37;
            border-radius: 8px;
            padding: 10px;
            overflow: hidden;
        }

        .card h3 {
            font-size: 12px;
            margin: 0 0 5px;
            color: #9ca3af;
        }

        canvas {
            height: 160px !important;
        }
    </style>
</head>

<body>

    <h1>Smart Energy Monitoring Dashboard</h1>

    <div class="grid">

        <div class="card" style="grid-column: span 2;">
            <h3>Daily Consumption</h3>
            <div id="kpi"></div>
            <canvas id="dailyChart"></canvas>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>Weekly Trend</h3>
            <canvas id="weeklyChart"></canvas>
        </div>

        <div class="card">
            <h3>Region Usage</h3>
            <canvas id="regionChart"></canvas>
        </div>

        <div class="card" style="grid-column: span 3;">
            <h3>Real-Time Feed</h3>
            <div id="realtime"></div>
        </div>

        <div class="card">
            <h3>Performance</h3>
            <canvas id="perfChart"></canvas>
        </div>

    </div>

</body>

</html>
